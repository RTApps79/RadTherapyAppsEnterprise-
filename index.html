<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RadTherapyApps Enterprise</title>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/app.css">

</head>

<body>

<div id="loadingScreen">

    <div class="spinner"></div>

    <h2>Loading RadTherapyApps Enterprise...</h2>

</div>


<div id="application">

<header id="topRibbon">

    <div class="logo">

        RadTherapyApps Enterprise

    </div>

 <div class="patientInfo">

    <label for="patientSelector">

        Active Patient

    </label>

    <select id="patientSelector">

        <option>

            Loading...

        </option>

    </select>

</div>
</header>


<nav id="sidebar">

    <button data-module="dashboard">Dashboard</button>

    <button data-module="workflow">Workflow</button>

    <button data-module="emr">EMR</button>

    <button data-module="ois">OIS</button>

    <button data-module="simulation">Simulation</button>

    <button data-module="linac">LINAC</button>

    <button data-module="planning">Treatment Planning</button>

    <button data-module="physics">Physics QA</button>

    <button data-module="dicom">DICOM</button>

    <button data-module="education">Education</button>

</nav>


<main id="workspace">

    <div id="moduleContainer"></div>

</main>


<footer id="statusBar">

    <span id="statusText">

        Ready

    </span>

    <span id="version">

        Enterprise Build

    </span>

</footer>

</div>


<div id="notificationContainer"></div>

<div id="dialogContainer"></div>


<script type="module"
src="js/app.js">
</script>

</body>
</html>
