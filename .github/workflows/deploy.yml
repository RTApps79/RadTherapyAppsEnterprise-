name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint HTML files
        run: |
          npm install -g htmlhint
          htmlhint index.html

      - name: Check CSS syntax
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "css/**/*.css" --config ~/.stylelintrc.json || true

      - name: Validate JavaScript
        run: |
          npm install -g eslint
          eslint "js/**/*.js" || true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create build directory
        run: |
          mkdir -p build
          cp -r index.html css js assets modules patients plans dicom build/ || true

      - name: Generate build report
        run: |
          echo "Build Summary:" > build/BUILD_REPORT.txt
          echo "Generated: $(date)" >> build/BUILD_REPORT.txt
          echo "Files included:" >> build/BUILD_REPORT.txt
          find build -type f | head -20 >> build/BUILD_REPORT.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: build/
          retention-days: 30

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g jest @babel/core @babel/preset-env || true

      - name: Run unit tests
        run: |
          if [ -f "jest.config.js" ]; then
            npm test
          else
            echo "No test suite configured yet. Skipping unit tests."
          fi
        continue-on-error: true

      - name: Check for broken links in HTML
        run: |
          npm install -g broken-link-checker
          npm install -g http-server &
          sleep 2
          blc index.html -ro || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ test, security-scan ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy message
        run: |
          echo "✅ Staging deployment ready"
          echo "Branch: develop"
          echo "Would deploy to staging environment"

  deploy-production:
    name: Deploy to Production (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [ test, security-scan ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Build application
        run: |
          mkdir -p _site
          cp -r index.html css js assets modules patients plans dicom _site/ || true
          echo "RadTherapyApps Enterprise" > _site/README.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

      - name: Create deployment notification
        run: |
          echo "🚀 Production deployment successful!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [ deploy-production ]
    if: always()
    
    steps:
      - name: Workflow completion status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ All checks passed! Application deployed successfully."
          else
            echo "⚠️ Workflow completed with status: ${{ needs.deploy-production.result }}"
          fi
