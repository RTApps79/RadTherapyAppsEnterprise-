name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Code Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint HTML files
        run: |
          npm install -g htmlhint
          htmlhint index.html
        continue-on-error: true

      - name: Check CSS syntax
        run: |
          npm install -g stylelint stylelint-config-standard
          stylelint "css/**/*.css" || true
        continue-on-error: true

      - name: Validate JavaScript
        run: |
          npm install -g eslint
          eslint "js/**/*.js" || true
        continue-on-error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create build directory
        run: |
          mkdir -p build
          cp index.html build/ 2>/dev/null || true
          cp -r css build/ 2>/dev/null || true
          cp -r js build/ 2>/dev/null || true
          cp -r assets build/ 2>/dev/null || true
          cp -r modules build/ 2>/dev/null || true
          cp -r patients build/ 2>/dev/null || true
          cp -r plans build/ 2>/dev/null || true
          cp -r dicom build/ 2>/dev/null || true

      - name: Generate build report
        run: |
          echo "Build Summary:" > build/BUILD_REPORT.txt
          echo "Generated: $(date)" >> build/BUILD_REPORT.txt
          echo "Files included:" >> build/BUILD_REPORT.txt
          find build -type f -not -path '*/\.*' | head -20 >> build/BUILD_REPORT.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 30

  test:
    name: Run Tests & Link Check
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for broken links in HTML
        run: |
          npm install -g broken-link-checker
          echo "HTML structure validation..."
          if [ -f "index.html" ]; then
            echo "✓ index.html found"
          fi
        continue-on-error: true

  deploy-production:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ test, build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build application for deployment
        run: |
          mkdir -p _site
          cp index.html _site/ 2>/dev/null || true
          cp -r css _site/ 2>/dev/null || true
          cp -r js _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true
          cp -r modules _site/ 2>/dev/null || true
          cp -r patients _site/ 2>/dev/null || true
          cp -r plans _site/ 2>/dev/null || true
          cp -r dicom _site/ 2>/dev/null || true
          echo "RadTherapyApps Enterprise" > _site/README.txt

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment notification
        run: |
          echo "🚀 Production deployment successful!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
